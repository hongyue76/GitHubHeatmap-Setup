<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub 贡献热力图生成器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔥 GitHub 贡献热力图生成器</h1>
            <p class="subtitle">输入 GitHub 用户名，生成可视化贡献图和分享卡片</p>
        </header>

        <div class="input-section">
            <div class="input-group">
                <input 
                    type="text" 
                    id="usernameInput" 
                    placeholder="输入 GitHub 用户名 (例如: octocat)"
                    autocomplete="off"
                >
                <button id="generateBtn" onclick="generateHeatmap()">生成热力图</button>
            </div>
            
            <div class="options">
                <label>颜色主题：</label>
                <select id="colorScheme">
                    <option value="default">默认绿色</option>
                    <option value="blue">蓝色</option>
                    <option value="purple">紫色</option>
                    <option value="orange">橙色</option>
                </select>
            </div>
        </div>

        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>正在获取数据...</p>
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <div id="result" class="result" style="display: none;">
            <div class="user-info">
                <img id="avatar" src="" alt="Avatar">
                <div class="user-details">
                    <h2 id="userName"></h2>
                    <p id="userBio"></p>
                    <div class="stats">
                        <span id="totalContributions"></span>
                    </div>
                </div>
            </div>

            <div class="heatmap-container">
                <h3>贡献热力图</h3>
                <img id="heatmapImage" src="" alt="Contribution Heatmap">
                <button class="download-btn" onclick="downloadImage('heatmapImage', 'heatmap.png')">
                    📥 下载热力图
                </button>
            </div>

            <div class="language-chart-container">
                <h3>语言分布</h3>
                <img id="languageImage" src="" alt="Language Distribution">
                <button class="download-btn" onclick="downloadImage('languageImage', 'languages.png')">
                    📥 下载语言图
                </button>
            </div>

            <div class="share-card-container">
                <h3>分享卡片</h3>
                <img id="shareCardImage" src="" alt="Share Card">
                <button class="download-btn" onclick="downloadImage('shareCardImage', 'share-card.png')">
                    📥 下载分享卡片
                </button>
            </div>

            <div class="projects-section">
                <h3>热门项目</h3>
                <div id="projectsList" class="projects-list"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
